name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (EAS)
        working-directory: artifacts/yvl-mobile
        run: eas build --platform android --profile preview --non-interactive --output ./build/yvl-music.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yvl-music-apk
          path: artifacts/yvl-mobile/build/yvl-music.apk
          retention-days: 30

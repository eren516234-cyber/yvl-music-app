name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: artifacts/yvl-mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generate Android project)
        working-directory: artifacts/yvl-mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Grant Gradle execute permission
        working-directory: artifacts/yvl-mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/yvl-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare output directory
        run: mkdir -p artifacts/yvl-mobile/build

      - name: Copy APK to output
        run: |
          cp artifacts/yvl-mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/yvl-mobile/build/yvl-music.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yvl-music-apk
          path: artifacts/yvl-mobile/build/yvl-music.apk
          retention-days: 30
